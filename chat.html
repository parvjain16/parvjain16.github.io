<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>ChatGPT</title>
    <link rel="stylesheet" href="./scripts/chat.js">
  </head>
  <body>
    <div class="chat-window">
      <div class="chat-header">
        <h2>ChatGPT</h2>
      </div>
      <div id="chat-body" class="chat-body"></div>
      <form id="chat-form" class="chat-form">
        <input id="chat-input" class="chat-input" type="text" placeholder="Ask me anything...">
        <button class="chat-submit" type="submit">Send</button>
      </form>
    </div>
    <script src="./scripts/chat.js"></script>
  </body>
</html>
